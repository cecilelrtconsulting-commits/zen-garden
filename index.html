<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Garden - The Mindful Playground</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00897B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zen Garden">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================
           DESIGN SYSTEM - ZENITH PULSE
        ============================================ */
        :root {
            --primary: #00897B;
            --primary-light: #4DB6AC;
            --primary-dark: #00695C;
            --secondary: #FF9800;
            --secondary-light: #FFB74D;
            --tertiary: #9C27B0;
            --tertiary-light: #CE93D8;
            --danger: #EF5350;
            --success: #66BB6A;
            --neutral: #F0F4F4;
            --neutral-mid: #E0E8E8;
            --text-main: #263238;
            --text-light: #90A4AE;
            --white: #FFFFFF;
            --glass-bg: rgba(255,255,255,0.72);
            --glass-border: rgba(255,255,255,0.5);
            --radius-full: 9999px;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 4px 24px rgba(0,137,123,0.10);
            --shadow-lg: 0 8px 40px rgba(0,137,123,0.14);
            --font-h: 'Plus Jakarta Sans', sans-serif;
            --font-b: 'Lexend', sans-serif;
            --t: 0.25s cubic-bezier(0.16,1,0.3,1);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-b);
            background: linear-gradient(135deg, #E0F2F1 0%, #E8EAF6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ============================================
           APP SHELL
        ============================================ */
        #app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 900px;
            background: var(--neutral);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.15);
            border-radius: 0;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            z-index: 20;
        }

        .top-bar-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--tertiary), var(--tertiary-light));
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem;
        }

        .top-bar-center { display: flex; flex-direction: column; align-items: center; }
        .top-bar-title { font-family: var(--font-h); font-weight: 800; font-size: 1.1rem; color: var(--primary); letter-spacing: -0.03em; }
        .top-bar-sub { font-size: 0.72rem; color: var(--text-light); font-weight: 500; }

        .top-bar-action { font-size: 1.1rem; color: var(--text-light); cursor: pointer; padding: 6px; }

        /* MAIN CONTENT */
        #main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 18px 90px;
            scroll-behavior: smooth;
        }

        #main::-webkit-scrollbar { display: none; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 10px 8px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            z-index: 20;
        }

        .nav-btn {
            background: none; border: none;
            display: flex; flex-direction: column;
            align-items: center; gap: 3px;
            color: var(--text-light);
            font-family: var(--font-b);
            font-size: 0.68rem; font-weight: 500;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: var(--radius-lg);
            transition: var(--t);
            flex: 1;
        }

        .nav-btn i { font-size: 1.2rem; transition: var(--t); }

        .nav-btn.active {
            color: var(--primary);
            background: rgba(0,137,123,0.08);
        }

        .nav-btn.active i { transform: translateY(-2px); }

        /* VIEW TRANSITION */
        .view-enter { animation: viewSlideIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }
        @keyframes viewSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           SHARED COMPONENTS
        ============================================ */
        .card {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }

        .section-title {
            font-family: var(--font-h); font-weight: 700;
            font-size: 1.05rem; color: var(--text-main);
            margin-bottom: 12px;
        }

        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: var(--radius-full);
            font-size: 0.72rem; font-weight: 700;
        }

        .badge-primary { background: rgba(0,137,123,0.12); color: var(--primary); }
        .badge-secondary { background: rgba(255,152,0,0.12); color: var(--secondary); }
        .badge-tertiary { background: rgba(156,39,176,0.12); color: var(--tertiary); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px 24px; border-radius: var(--radius-full);
            border: none; font-family: var(--font-h); font-weight: 700; font-size: 0.95rem;
            cursor: pointer; transition: var(--t); letter-spacing: -0.01em;
        }

        .btn:active { transform: scale(0.95); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: 0 4px 16px rgba(0,137,123,0.3);
        }

        .btn-icon {
            width: 56px; height: 56px;
            border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; transition: var(--t);
        }

        .btn-icon:active { transform: scale(0.9); }

        .back-btn {
            background: none; border: none;
            color: var(--text-light); font-size: 1rem;
            cursor: pointer; padding: 4px 0;
            display: flex; align-items: center; gap: 6px;
            font-family: var(--font-b); font-weight: 500;
            margin-bottom: 20px; transition: color var(--t);
        }
        .back-btn:hover { color: var(--primary); }

        /* INFO ROW */
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 4px;
        }

        /* PROGRESS BAR */
        .progress-wrap { background: var(--neutral-mid); border-radius: var(--radius-full); height: 10px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: var(--radius-full); transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }

        /* XP BUBBLE */
        .xp-bubble {
            position: fixed;
            background: var(--secondary);
            color: white; font-weight: 700; font-size: 0.85rem;
            padding: 5px 12px; border-radius: var(--radius-full);
            pointer-events: none;
            box-shadow: 0 4px 12px rgba(255,152,0,0.4);
            z-index: 9999;
            animation: bubbleUp 1.2s ease-out forwards;
        }

        @keyframes bubbleUp {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            80%  { opacity: 1; }
            100% { opacity: 0; transform: translateY(-60px) scale(1.1); }
        }

        /* ============================================
           DASHBOARD VIEW
        ============================================ */
        .greeting { margin-bottom: 20px; }
        .greeting h2 { font-family: var(--font-h); font-size: 1.5rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.03em; }
        .greeting p  { color: var(--text-light); font-size: 0.88rem; margin-top: 2px; }

        .xp-card { 
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white; 
        }

        .xp-card .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .xp-card .level-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.78rem; font-weight: 700; }
        .xp-card h3 { font-family: var(--font-h); font-size: 1.1rem; font-weight: 700; }
        .xp-card .xp-nums { display: flex; justify-content: space-between; font-size: 0.75rem; opacity: 0.8; margin-top: 6px; }
        .xp-card .progress-wrap { background: rgba(255,255,255,0.25); }
        .xp-card .progress-bar { background: white; }

        .streak-card {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-light));
            display: flex; justify-content: space-between; align-items: center;
        }

        .streak-card .streak-info h3 { font-family: var(--font-h); font-size: 1.4rem; font-weight: 800; color: white; }
        .streak-card .streak-info p  { color: rgba(255,255,255,0.85); font-size: 0.82rem; margin-top: 2px; }
        .streak-card .flame { font-size: 3rem; animation: flamePulse 2s ease-in-out infinite; }

        @keyframes flamePulse {
            0%,100% { transform: scale(1) rotate(-3deg); }
            50%      { transform: scale(1.1) rotate(3deg); }
        }

        .quest-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--neutral-mid);
            transition: opacity var(--t);
        }
        .quest-item:last-child { border-bottom: none; }
        .quest-item.done { opacity: 0.45; }

        .quest-icon-wrap {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--neutral); display: flex;
            align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }

        .quest-text { flex: 1; }
        .quest-text h4 { font-size: 0.9rem; font-weight: 600; color: var(--text-main); margin-bottom: 2px; }

        .quest-check {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid var(--primary); background: none;
            color: var(--primary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; transition: var(--t); flex-shrink: 0;
        }
        .quest-check:active { transform: scale(0.85); }
        .quest-check.done { background: var(--primary); color: white; border-color: var(--primary); }

        /* ============================================
           ACTIVITIES VIEW
        ============================================ */
        .act-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .act-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 18px 14px;
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--t);
            position: relative;
            overflow: hidden;
        }

        .act-card:active { transform: scale(0.95); box-shadow: none; }

        .act-card.rec::after {
            content: '★ TOP';
            position: absolute; top: 10px; right: -20px;
            background: var(--secondary); color: white;
            font-size: 0.6rem; font-weight: 800;
            padding: 2px 22px; transform: rotate(45deg);
        }

        .act-ico {
            width: 56px; height: 56px; border-radius: 50%;
            margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: white;
        }

        .act-ico-yoga { background: linear-gradient(135deg,#80CBC4,var(--primary)); }
        .act-ico-workout { background: linear-gradient(135deg,var(--secondary-light),var(--secondary)); }
        .act-ico-walk { background: linear-gradient(135deg,#A5D6A7,#388E3C); }
        .act-ico-reiki { background: linear-gradient(135deg,var(--tertiary-light),var(--tertiary)); }

        .act-name { font-family: var(--font-h); font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
        .act-meta { font-size: 0.75rem; color: var(--text-light); font-weight: 500; }

        /* Intensity dots */
        .intensity { display: flex; gap: 3px; justify-content: center; margin-top: 6px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--neutral-mid); }
        .dot.on { background: var(--secondary); }

        /* ============================================
           WALK TRACKER VIEW
        ============================================ */
        .tracker-wrap { display: flex; flex-direction: column; align-items: center; }

        .ring-container { position: relative; width: 220px; height: 220px; margin: 24px auto; }

        .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .ring-bg { fill: none; stroke: var(--neutral-mid); stroke-width: 14; }
        .ring-fill { fill: none; stroke: #388E3C; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 628; stroke-dashoffset: 628; transition: stroke-dashoffset 0.5s linear; }

        .ring-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            text-align: center;
        }

        .timer-main { font-family: var(--font-h); font-size: 2.4rem; font-weight: 800; color: var(--text-main); line-height: 1; }
        .timer-sub  { font-size: 0.78rem; color: var(--text-light); margin-top: 4px; font-weight: 500; }

        .flow-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: var(--radius-full);
            background: var(--neutral-mid); color: var(--text-light);
            font-weight: 700; font-size: 0.88rem;
            transition: all 0.5s ease; margin-bottom: 28px;
        }

        .flow-pill.active {
            background: var(--secondary); color: white;
            box-shadow: 0 4px 16px rgba(255,152,0,0.35);
            animation: pillPulse 2s infinite;
        }

        @keyframes pillPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.03);} }

        .milestones {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; gap: 6px; margin-bottom: 24px;
        }

        .milestone {
            flex: 1; text-align: center;
            padding: 8px 4px;
            background: var(--neutral-mid);
            border-radius: var(--radius-md);
            font-size: 0.7rem; font-weight: 600;
            color: var(--text-light); transition: var(--t);
        }

        .milestone.reached {
            background: rgba(56,142,60,0.12);
            color: #388E3C;
        }

        .controls { display: flex; gap: 16px; align-items: center; }

        /* ============================================
           REIKI TIMER VIEW
        ============================================ */
        .reiki-wrap { display: flex; flex-direction: column; align-items: center; }

        .reiki-orb {
            width: 230px; height: 230px; border-radius: 50%;
            background: linear-gradient(135deg, var(--tertiary), var(--tertiary-light));
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; margin: 20px auto 20px;
            box-shadow: 0 12px 40px rgba(156,39,176,0.35);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .reiki-orb.pulsing {
            animation: orbBreathe 5s ease-in-out infinite;
        }

        @keyframes orbBreathe {
            0%,100% { transform: scale(1); box-shadow: 0 12px 40px rgba(156,39,176,0.35); }
            50%      { transform: scale(1.05); box-shadow: 0 16px 60px rgba(156,39,176,0.55); }
        }

        .reiki-time { font-family: var(--font-h); font-size: 2.8rem; font-weight: 800; line-height: 1; }
        .reiki-label { font-size: 0.78rem; opacity: 0.85; margin-top: 4px; font-weight: 500; }

        /* Sub timer ring */
        .sub-ring-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; }
        .sub-ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .sub-ring-bg { fill: none; stroke: rgba(156,39,176,0.15); stroke-width: 8; }
        .sub-ring-fill { fill: none; stroke: var(--tertiary); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
        .sub-ring-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            text-align: center;
        }
        .sub-time-txt { font-family: var(--font-h); font-size: 1.3rem; font-weight: 800; color: var(--tertiary); }
        .sub-time-lbl { font-size: 0.6rem; color: var(--text-light); font-weight: 600; }

        .reiki-xp-strip {
            background: var(--white);
            border-radius: var(--radius-full);
            padding: 12px 24px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: var(--shadow);
            font-weight: 700; color: var(--tertiary);
            margin-bottom: 24px; font-size: 1rem;
        }

        /* Flash overlay */
        #reiki-flash {
            position: fixed; inset: 0;
            background: transparent;
            pointer-events: none; z-index: 9000;
            transition: background 0.3s ease;
        }

        /* ============================================
           WORKOUT VIEW
        ============================================ */
        .wo-option {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 18px 20px;
            display: flex; align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--t);
            border: 2px solid transparent;
        }
        .wo-option:active { transform: scale(0.97); border-color: var(--secondary); }
        .wo-option:hover  { border-color: rgba(255,152,0,0.3); }

        .wo-option-left  { display: flex; align-items: center; gap: 16px; }
        .wo-option-icon  {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .wo-option-label { font-family: var(--font-h); font-weight: 700; font-size: 1rem; }
        .wo-option-sub   { font-size: 0.76rem; color: var(--text-light); margin-top: 2px; }
        .wo-option-xp    {
            font-family: var(--font-h); font-weight: 800;
            font-size: 1rem; color: var(--secondary);
            background: rgba(255,152,0,0.1);
            padding: 6px 14px; border-radius: var(--radius-full);
            white-space: nowrap;
        }

        /* ============================================
           YOGA VIEW
        ============================================ */
        .yoga-flow-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 16px 18px;
            display: flex; align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--t);
        }
        .yoga-flow-card:active  { transform: scale(0.97); }
        .yoga-flow-card:hover   { border-color: var(--flow-color, var(--primary)); background: var(--flow-bg, var(--neutral)); }

        .yoga-flow-left  { display: flex; align-items: center; gap: 14px; }
        .yoga-flow-icon  {
            width: 50px; height: 50px; font-size: 1.8rem;
            border-radius: 14px;
            background: var(--flow-bg, var(--neutral));
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .yoga-flow-name  { font-family: var(--font-h); font-weight: 700; font-size: 1rem; color: var(--text-main); margin-bottom: 2px; }
        .yoga-flow-desc  { font-size: 0.75rem; color: var(--text-light); }
        .yoga-flow-poses { display: flex; gap: 6px; align-items: center; font-size: 1.2rem; }

        /* Phase progress dots */
        .yoga-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--neutral-mid);
            transition: var(--t);
        }
        .yoga-dot.yoga-dot-active  { background: var(--primary); }
        .yoga-dot.yoga-dot-current {
            width: 24px; border-radius: 5px;
            background: var(--primary);
            box-shadow: 0 2px 8px rgba(0,137,123,0.4);
        }

        /* ============================================
           JOURNEY VIEW
        ============================================ */

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

        .stat-tile {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 18px 14px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-ico {
            width: 44px; height: 44px; border-radius: 50%;
            margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }

        .stat-val { font-family: var(--font-h); font-size: 1.7rem; font-weight: 800; color: var(--text-main); line-height: 1; }
        .stat-lbl { font-size: 0.75rem; color: var(--text-light); margin-top: 3px; font-weight: 500; }

        /* Bar Chart */
        .bar-chart-wrap { display: flex; align-items: flex-end; height: 110px; gap: 8px; border-bottom: 1px solid var(--neutral-mid); padding-bottom: 8px; }
        .bc-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .bc-bar { width: 100%; border-radius: 6px 6px 0 0; min-height: 4px; transition: height 0.9s cubic-bezier(0.16,1,0.3,1); }
        .bc-lbl { font-size: 0.68rem; color: var(--text-light); font-weight: 600; }

        /* Achievement */
        .ach-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--neutral-mid); }
        .ach-item:last-child { border-bottom: none; }
        .ach-emoji { font-size: 2rem; }
        .ach-title { font-weight: 700; font-size: 0.9rem; }
        .ach-desc  { font-size: 0.78rem; color: var(--text-light); margin-top: 2px; }

        /* ============================================
           SOUL VIEW
        ============================================ */
        .soul-cover {
            height: 110px;
            background: linear-gradient(135deg, var(--tertiary), var(--secondary));
            border-radius: var(--radius-xl);
            position: relative;
            margin-bottom: 54px;
        }

        .soul-avatar {

/* ============================================
   QUEST POOL — Banque de quêtes quotidiennes
============================================ */
const QUEST_POOL = [
    { icon:'fa-om',                 label:'Méditer 10 min',                        xp:25, cat:'🧘' },
    { icon:'fa-glass-water',        label:'Boire 1,5 L d\'eau',                    xp:15, cat:'💧' },

    { icon:'fa-utensils',           label:'Pas de grignotage entre les repas',     xp:25, cat:'🥗' },
    { icon:'fa-tv',                 label:'Ne pas manger devant la télé',          xp:20, cat:'🥗' },
    { icon:'fa-bowl-food',          label:'Manger un repas fait maison',           xp:20, cat:'🥗' },
    { icon:'fa-wind',               label:'Respiration profonde 5 min',            xp:15, cat:'🧘' },

/* Simple seeded RNG basé sur la date — stable toute la journée */
function seededRand(seed) {
    let s = seed;
    return function() {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
    };
}

function pickDailyQuests() {
    const today = new Date().toDateString();
    // Seed = somme des codes char de la date (stable & unique par jour)
    const seed = today.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
    const rand = seededRand(seed);

    // Shuffle une copie du pool avec notre RNG seeded
    const pool = QUEST_POOL.slice();
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    // Prendre les 3 premières et leur affecter des IDs
    return pool.slice(0, 3).map((q, i) => ({ ...q, id: i + 1, done: false }));
}

/* Retourne la clé de semaine ISO-like pour grouper les activités */
function getWeekKey(d) {
    const date = d ? new Date(d) : new Date();
    const jan1 = new Date(date.getFullYear(), 0, 1);
    const week = Math.ceil(((date - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    return `${date.getFullYear()}-W${String(week).padStart(2, '0')}`;
}

/* ============================================
   STORE (State + localStorage)
============================================ */
const Store = (() => {
    const today = new Date().toDateString();

    const DEFAULTS = {
        level: 1, xp: 0, xpMax: 100,
        streak: 1,
        lastDate: today,
        quests: pickDailyQuests(),
        dailyXP: {},
        achievements: [],
        // Nouveaux compteurs pour les badges avancés
        totalXPEarned: 0,
        yogaCount: 0,
        walkCount: 0,
        workoutCount: 0,
        reikiMinutes: 0,
        weekReikiSessions: {},
        activityLog: {},
        yogaFlowsCompleted: [],
        perfectQuestStreak: 0,
        perfectQuestLastDate: ''
    };

    function load() {
        try {
            const raw = localStorage.getItem('zenGarden_v3');
            if (raw) {
                const s = JSON.parse(raw);
                if (s.lastDate !== today) {
                    // Calcul du nb de jours écoulés depuis la dernière visite
                    const last    = new Date(s.lastDate);
                    const now     = new Date(today);
                    const diffMs  = now - last;
                    const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));

                    if (diffDays === 1) {
                        // Jour consécutif : streak continue
                        s.streak = (s.streak || 0) + 1;
                    } else {
                        // Jour(s) sauté(s) : streak repart à 1
                        s.streak = 1;
                    }
                    s.quests  = pickDailyQuests();
                    s.lastDate = today;
                    // Sauvegarde immédiate pour ne pas rejouer le calcul
                    localStorage.setItem('zenGarden_v3', JSON.stringify(s));
                }
                return s;
            }
        } catch(e) {}
        return JSON.parse(JSON.stringify(DEFAULTS));
    }

    let state = load();

    function save() { localStorage.setItem('zenGarden_v3', JSON.stringify(state)); }

    function addXP(amount, x, y) {
        state.xp += amount;
        if (state.xp >= state.xpMax) {
            state.level++;
            state.xp -= state.xpMax;
            state.xpMax = Math.floor(state.xpMax * 1.5);
        }
        if (!state.dailyXP) state.dailyXP = {};
        state.dailyXP[today] = (state.dailyXP[today] || 0) + amount;
        if (!state.totalXPEarned) state.totalXPEarned = 0;
        state.totalXPEarned += amount;
        save();
        updateHeader();
        if (x !== undefined) spawnBubble(amount, x, y);
        document.dispatchEvent(new CustomEvent('stateUpdate'));
    }

    function logActivity(type, meta) {
        // type: 'walk' | 'yoga' | 'workout' | 'reiki'
        if (!state.activityLog)         state.activityLog = {};
        if (!state.activityLog[today])  state.activityLog[today] = {};
        state.activityLog[today][type] = true;

        const wk = getWeekKey();
        if (type === 'yoga') {
            state.yogaCount = (state.yogaCount || 0) + 1;
            if (meta?.flowId && !state.yogaFlowsCompleted) state.yogaFlowsCompleted = [];
            if (meta?.flowId && !state.yogaFlowsCompleted.includes(meta.flowId))
                state.yogaFlowsCompleted.push(meta.flowId);
        }
        if (type === 'walk')    state.walkCount    = (state.walkCount    || 0) + 1;
        if (type === 'workout') state.workoutCount = (state.workoutCount || 0) + 1;
        if (type === 'reiki') {
            if (!state.weekReikiSessions) state.weekReikiSessions = {};
            state.weekReikiSessions[wk] = (state.weekReikiSessions[wk] || 0) + 1;
            state.reikiMinutes = (state.reikiMinutes || 0) + (meta?.minutes || 45);
        }
        save();
    }

    function tickPerfectQuestStreak() {
        if (!state.quests.every(q => q.done)) return;
        if (state.perfectQuestLastDate === today) return;
        if (state.perfectQuestLastDate) {
            const last  = new Date(state.perfectQuestLastDate);
            const now   = new Date(today);
            const diff  = Math.round((now - last) / (1000 * 60 * 60 * 24));
            state.perfectQuestStreak = diff === 1 ? (state.perfectQuestStreak || 0) + 1 : 1;
        } else {
            state.perfectQuestStreak = 1;
        }
        state.perfectQuestLastDate = today;
        save();
    }

    function unlockBadge(id) {
        if (!state.achievements) state.achievements = [];
        if (state.achievements.find(a => a.id === id)) return; // déjà débloqué
        state.achievements.push({ id, date: today });
        save();
        document.dispatchEvent(new CustomEvent('stateUpdate'));
    }

    function completeQuest(id, x, y) {
        const q = state.quests.find(q => q.id === id);
        if (!q || q.done) return;
        q.done = true;
        addXP(q.xp, x, y);
    }

    function reset() {
        state = JSON.parse(JSON.stringify(DEFAULTS));
        save();
        updateHeader();
        document.dispatchEvent(new CustomEvent('stateUpdate'));
    }

    function updateHeader() {
        const el = document.getElementById('hdr-sub');
        if (el) el.textContent = `Lvl ${state.level}  ·  ${state.xp} XP`;
    }

    function spawnBubble(amount, x, y) {
        const el = document.createElement('div');
        el.className = 'xp-bubble';
        el.textContent = `+${amount} XP`;
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1300);
    }

    return { get state() { return state; }, addXP, completeQuest, reset, updateHeader, unlockBadge, logActivity, tickPerfectQuestStreak };
})();


/* ============================================
   ROUTER / APP CONTROLLER
============================================ */
const App = (() => {
    const views = {};
    let current = null;
    let walkInterval = null;
    let reikiInterval = null;

    function register(name, mod) { views[name] = mod; }

    function navigate(name) {
        // Stop any running trackers when leaving
        if (current && current.teardown) current.teardown();

        // Update nav buttons
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.view === name);
        });
        // Only show bottom nav buttons for main views
        const isMain = ['dashboard','activities','journey','soul'].includes(name);
        document.querySelector('.bottom-nav').style.display = isMain ? 'flex' : 'flex';

        const main = document.getElementById('main');
        main.innerHTML = '';

        const view = views[name];
        if (!view) { main.innerHTML = '<div class="card"><p>Vue introuvable.</p></div>'; return; }

        current = view;
        const el = document.createElement('div');
        el.className = 'view-enter';
        el.innerHTML = view.render();
        main.appendChild(el);
        if (view.mount) view.mount();
        Store.updateHeader();
    }

    function init() {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => navigate(btn.dataset.view));
        });
        navigate('dashboard');
    }

    return { register, navigate, init };
})();

App.register('yoga', {
    _selectedFlow: null,
    _interval: null,
    _remaining: 600, // 10 min
    _phase: 0,       // current pose index (0–4)
    _running: false,
    _audioCtx: null,
    PHASE_DURATION: 120, // 2 min per pose

    teardown() {
        clearInterval(this._interval);
        this._running = false;
        this._remaining = 600;
        this._phase = 0;
        this._selectedFlow = null;
    },

    render() {
        return `
        <button class="back-btn" id="yoga-back"><i class="fa-solid fa-arrow-left"></i> Retour</button>

        <!-- FLOW SELECTOR -->
        <div id="yoga-selector">
            <div style="text-align:center;margin-bottom:24px">
                <div style="font-size:2.5rem;margin-bottom:6px">🧘</div>
                <h2 style="font-family:var(--font-h);font-weight:800;font-size:1.45rem;letter-spacing:-0.03em">Yoga Vinyasa</h2>
                <p style="color:var(--text-light);font-size:0.85rem;margin-top:4px">Choisissez votre flow du moment</p>
            </div>

            <div style="display:flex;flex-direction:column;gap:14px">
                ${Object.entries(YOGA_FLOWS).map(([key, flow]) => `
                <div class="yoga-flow-card" data-flow="${key}" style="--flow-color:${flow.color};--flow-bg:${flow.colorLight}">
                    <div class="yoga-flow-left">
                        <div class="yoga-flow-icon">${flow.emoji}</div>
                        <div>
                            <div class="yoga-flow-name">${flow.name}</div>
                            <div class="yoga-flow-desc">${flow.desc}</div>
                        </div>
                    </div>
                    <div class="yoga-flow-poses">
                        ${flow.poses.slice(0,3).map(p => `<span>${p.icon}</span>`).join('')}<span style="color:var(--text-light);font-size:0.7rem">+${flow.poses.length - 3}</span>
                    </div>
                </div>
                `).join('')}
            </div>
        </div>

        <!-- TIMER (hidden until flow selected) -->
        <div id="yoga-timer" style="display:none">
            <div style="text-align:center;margin-bottom:12px">
                <div id="yoga-flow-label" style="font-family:var(--font-h);font-weight:800;font-size:1.3rem"></div>
                <p style="color:var(--text-light);font-size:0.82rem;margin-top:2px">10 minutes · 5 postures × 2 min</p>
            </div>

            <!-- RING -->
            <div class="ring-container" style="margin:16px auto 20px">
                <svg class="ring-svg" viewBox="0 0 200 200">
                    <circle class="ring-bg" cx="100" cy="100" r="88"/>
                    <circle class="ring-fill" id="yoga-ring" cx="100" cy="100" r="88" style="stroke:var(--primary)"/>
                </svg>
                <div class="ring-center">
                    <div class="timer-main" id="yoga-time">10:00</div>
                    <div class="timer-sub" id="yoga-phase-num">Posture 1/5</div>
                </div>
            </div>

            <!-- POSE CARD -->
            <div id="yoga-pose-card" class="card" style="text-align:center;margin-bottom:20px;border-left:4px solid var(--primary);overflow:hidden;padding:0">
                <div id="yoga-img-wrap" style="width:100%;height:180px;background:#f8fafa;display:flex;align-items:center;justify-content:center;position:relative">
                    <img id="yoga-pose-img" src="" style="max-width:100%;max-height:100%;object-fit:contain;transition:opacity 0.3s">
                </div>
                <div style="padding:16px">
                    <div id="yoga-pose-name" style="font-family:var(--font-h);font-weight:700;font-size:1.1rem;margin-bottom:4px">Prêt·e ?</div>
                    <div id="yoga-pose-sanskrit" style="font-size:0.78rem;color:var(--text-light);font-style:italic">Appuyez sur Play pour démarrer</div>
                </div>
            </div>

            <!-- PHASE DOTS -->
            <div id="yoga-phase-dots" style="display:flex;justify-content:center;gap:8px;margin-bottom:24px">
                ${[0,1,2,3,4].map(i => `<div class="yoga-dot" id="yd-${i}"></div>`).join('')}
            </div>

            <!-- CONTROLS -->
            <div class="controls">
                <button class="btn-icon" id="yoga-play" style="background:var(--primary);color:white;box-shadow:0 4px 16px rgba(0,137,123,0.35);width:64px;height:64px;font-size:1.4rem">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button class="btn-icon" id="yoga-stop" style="background:#E0F2F1;color:var(--primary)">
                    <i class="fa-solid fa-stop"></i>
                </button>
            </div>
        </div>
        `;
    },

    mount() {
        document.getElementById('yoga-back').addEventListener('click', () => {
            this.teardown();
            App.navigate('activities');
        });

        // Flow selection
        document.querySelectorAll('.yoga-flow-card').forEach(card => {
            card.addEventListener('click', () => {
                this._selectedFlow = card.dataset.flow;
                this._remaining = 600;
                this._phase = 0;
                this._running = false;

                // Switch to timer view
                document.getElementById('yoga-selector').style.display = 'none';
                document.getElementById('yoga-timer').style.display = 'block';

                const flow = YOGA_FLOWS[this._selectedFlow];
                document.getElementById('yoga-flow-label').textContent = `${flow.emoji} Flow ${flow.name}`;
                document.getElementById('yoga-flow-label').style.color = flow.color;
                document.getElementById('yoga-ring').style.stroke = flow.color;

                this.showPose(0, false);
                this.updateTimerUI();
                this.updateDots();
            });
        });

        // Play/Pause
        const btnPlay = document.getElementById('yoga-play');
        btnPlay?.addEventListener('click', () => {
            if (!this._running) {
                if (!this._audioCtx) {
                    try { this._audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
                }
                this.startTimer();
                btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                this.pauseTimer();
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        });

        // Stop
        document.getElementById('yoga-stop')?.addEventListener('click', () => {
            this.pauseTimer();
            const elapsed = 600 - this._remaining;
            if (elapsed > 30) {
                const earnedXp = Math.round((elapsed / 600) * 50);
                Store.addXP(earnedXp, window.innerWidth / 2, 300);
                showToast(`🧘 Session arrêtée · +${earnedXp} XP`);
            }
            btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
            this._remaining = 600; this._phase = 0;
            this.updateTimerUI(); this.updateDots();
            if (this._selectedFlow) this.showPose(0, false);
        });
    },

    startTimer() {
        this._running = true;
        this._interval = setInterval(() => {
            if (this._remaining <= 0) {
                this.pauseTimer();
                document.getElementById('yoga-play').innerHTML = '<i class="fa-solid fa-play"></i>';
                Store.addXP(50, window.innerWidth / 2, 300);
                Store.unlockBadge('yogi');
                Store.logActivity('yoga', { flowId: this._selectedFlow });
                checkAutoBadges();
                confetti(window.innerWidth / 2, 300);
                showToast('🎉 Flow terminé ! Magnifique pratique · +50 XP');
                return;
            }

            this._remaining--;
            const elapsed = 600 - this._remaining;
            const newPhase = Math.min(Math.floor(elapsed / this.PHASE_DURATION), 4);

            if (newPhase !== this._phase) {
                this._phase = newPhase;
                this.showPose(newPhase, true);
                this.updateDots();
            }

            this.updateTimerUI();
        }, 1000);
    },

    pauseTimer() {
        clearInterval(this._interval);
        this._running = false;
    },

    showPose(index, withSound) {
        if (!this._selectedFlow) return;
        const flow = YOGA_FLOWS[this._selectedFlow];
        const pose = flow.poses[index];
        if (!pose) return;

        const imgEl      = document.getElementById('yoga-pose-img');
        const imgWrap    = document.getElementById('yoga-img-wrap');
        const name       = document.getElementById('yoga-pose-name');
        const skt        = document.getElementById('yoga-pose-sanskrit');
        const phaseEl    = document.getElementById('yoga-phase-num');

        if (imgEl && imgWrap) {
            imgEl.style.opacity = '0';
            setTimeout(() => {
                if (pose.img) {
                    // Image réelle disponible
                    imgEl.style.display = 'block';
                    imgWrap.style.background = '#f8fafa';
                    imgWrap.querySelector('.yoga-placeholder')?.remove();
                    imgEl.src = pose.img;
                    imgEl.style.opacity = '1';
                } else {
                    // Placeholder élégant avec l'emoji
                    imgEl.style.display = 'none';
                    imgWrap.style.background = 'linear-gradient(135deg, ' + flow.colorLight + ', rgba(255,255,255,0.4))';
                    let ph = imgWrap.querySelector('.yoga-placeholder');
                    if (!ph) {
                        ph = document.createElement('div');
                        ph.className = 'yoga-placeholder';
                        ph.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;transition:opacity 0.3s';
                        ph.innerHTML = `<div style="font-size:4rem">${pose.icon}</div><div style="font-size:0.72rem;color:var(--text-light);font-weight:600">Illustration bientôt disponible</div>`;
                        imgWrap.appendChild(ph);
                    }
                    setTimeout(() => ph.style.opacity = '1', 50);
                }
            }, 150);
        }

        if (name)    name.textContent    = pose.name;
        if (skt)     skt.textContent     = pose.sanskrit;
        if (phaseEl) phaseEl.textContent = `Posture ${index + 1}/5`;

        // Animate card
        const card = document.getElementById('yoga-pose-card');
        if (card) {
            card.style.borderLeftColor = flow.color;
            card.style.animation = 'none';
            void card.offsetWidth;
            card.style.animation = 'viewSlideIn 0.4s forwards';
        }

        if (withSound) this.playChime();
    },

    updateTimerUI() {
        const m = Math.floor(this._remaining / 60).toString().padStart(2, '0');
        const s = (this._remaining % 60).toString().padStart(2, '0');
        const timeEl = document.getElementById('yoga-time');
        if (timeEl) timeEl.textContent = `${m}:${s}`;

        const ring = document.getElementById('yoga-ring');
        if (ring) {
            const pct = 1 - (this._remaining / 600);
            ring.style.strokeDashoffset = 628 - 628 * pct;
        }
    },

    updateDots() {
        for (let i = 0; i < 5; i++) {
            const dot = document.getElementById(`yd-${i}`);
            if (!dot) continue;
            dot.className = 'yoga-dot' + (i <= this._phase ? ' yoga-dot-active' : '');
            if (i === this._phase) dot.classList.add('yoga-dot-current');
        }
    },

    playChime() {
        if (!this._audioCtx) return;
        try {
            [528, 660].forEach((freq, i) => {
                const osc  = this._audioCtx.createOscillator();
                const gain = this._audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, this._audioCtx.currentTime + i * 0.06);
                gain.gain.linearRampToValueAtTime(0.25, this._audioCtx.currentTime + i * 0.06 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, this._audioCtx.currentTime + 2.5);
                osc.connect(gain);
                gain.connect(this._audioCtx.destination);
                osc.start(this._audioCtx.currentTime + i * 0.06);
                osc.stop(this._audioCtx.currentTime + 2.5);
            });
        } catch(e) {}
    }
});

                    <i class="fa-solid fa-stop"></i>
                </button>
            </div>
        </div>
        `;
    },

    mount() {
        this._secs = 0; this._running = false; this._flow = 1;
        const btnPlay = document.getElementById('wk-play');
        const btnStop = document.getElementById('wk-stop');

        document.getElementById('wk-back').addEventListener('click', () => {
            this.teardown();
            App.navigate('activities');
        });

        btnPlay.addEventListener('click', () => {
            if (!this._running) {
                this.start();
                btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                this.pause();
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        });

        btnStop.addEventListener('click', () => {
            if (this._secs > 0) {
                showToast(`⏹ Marche arrêtée · ${Math.floor(this._secs/60)} min parcourues`);
                Store.addXP(Math.floor(this._secs/60) * 3);
            }
            this.teardown();
            this.updateUI();
            btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
        });
    },

    start() {
        this._running = true;
        this._interval = setInterval(() => {
            this._secs++;
            // XP every minute
            if (this._secs % 60 === 0) {
                const gained = 5 * this._flow;
                Store.addXP(gained, window.innerWidth/2, 200);
            }
            // Flow state at 5 min

                this._flow = 2;

                if (pill) pill.classList.add('active');
                if (txt)  txt.textContent = 'Flow State · x2 🔥';
                showToast('⚡ Flow State activé ! XP x2');
                Store.unlockBadge('flow_rider');
            }
            this.updateUI();
        }, 1000);
    },

    pause() {
        clearInterval(this._interval);
        this._running = false;
    },

    updateUI() {
        const m = Math.floor(this._secs/60).toString().padStart(2,'0');
        const s = (this._secs % 60).toString().padStart(2,'0');
        const timeEl = document.getElementById('wk-time');
        if (timeEl) timeEl.textContent = `${m}:${s}`;

        // Ring
        const ring = document.getElementById('wk-ring');
        if (ring) {
            const pct = Math.min(this._secs / this.TARGET, 1);
            ring.style.strokeDashoffset = 628 - (628 * pct);
        }

        // Milestones
        this.MILESTONES.forEach(ms => {
            const el = document.getElementById(`ms-${ms}`);
            if (el && this._secs >= ms*60) el.classList.add('reached');
        });

        // Done!
        if (this._secs >= this.TARGET && this._running) {
            this.pause();
            showToast('🎉 Objectif 20 min atteint ! Bravo !');
            confetti(window.innerWidth/2, 300);
            Store.addXP(50, window.innerWidth/2, 300);
            Store.unlockBadge('zen_walk');
            Store.logActivity('walk');
            checkAutoBadges();
        }
    }
});

App.register('reikiTimer', {
    _interval: null,
    TOTAL: 45 * 60,      // 45 minutes total (countdown)
    SUB_DURATION: 180,   // 3 minutes sub-timer
    _remaining: 45 * 60, // counts DOWN
    _sub: 180,           // sub-timer counts DOWN
    _running: false,
    _sessionXP: 0,
    _audioCtx: null,

    teardown() {
        clearInterval(this._interval);
        this._running = false;
        this._remaining = this.TOTAL;
        this._sub = this.SUB_DURATION;
        this._sessionXP = 0;
    },

    render() {
        return `
        <div id="reiki-flash" style="position:fixed;inset:0;background:transparent;pointer-events:none;z-index:9000;transition:background 0.3s"></div>
        <button class="back-btn" id="rk-back"><i class="fa-solid fa-arrow-left"></i> Retour</button>
        <div class="reiki-wrap">

            <div style="text-align:center;margin-bottom:4px">
                <h2 style="font-family:var(--font-h);font-weight:800;font-size:1.4rem">🙌 Session Reiki</h2>
                <p style="color:var(--text-light);font-size:0.82rem">45 minutes · Bol tibétain toutes les 3 min</p>
            </div>

            <!-- MAIN ORB — shows global countdown -->
            <div class="reiki-orb" id="rk-orb">
                <div class="reiki-time" id="rk-global">45:00</div>
                <div class="reiki-label" id="rk-orb-lbl">Durée restante</div>
            </div>

            <!-- SUB TIMER RING — 3 min loop -->
            <div class="sub-ring-wrap">
                <svg class="sub-ring-svg" viewBox="0 0 100 100">
                    <circle class="sub-ring-bg" cx="50" cy="50" r="42"/>
                    <circle class="sub-ring-fill" id="rk-subring" cx="50" cy="50" r="42"/>
                </svg>
                <div class="sub-ring-center">
                    <div class="sub-time-txt" id="rk-sub">03:00</div>
                    <div class="sub-time-lbl">prochain son</div>
                </div>
            </div>

            <!-- XP strip -->
            <div class="reiki-xp-strip">
                <i class="fa-solid fa-star" style="color:var(--secondary)"></i>
                <span id="rk-xp">+0 XP cette session</span>
            </div>

            <!-- CONTROLS -->
            <div class="controls">
                <button class="btn-icon" id="rk-play" style="background:var(--tertiary);color:white;box-shadow:0 4px 16px rgba(156,39,176,0.35);width:64px;height:64px;font-size:1.4rem">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button class="btn-icon" id="rk-stop" style="background:#F3E5F5;color:var(--tertiary)">
                    <i class="fa-solid fa-stop"></i>
                </button>
            </div>
        </div>
        `;
    },

    mount() {
        this._remaining = this.TOTAL;
        this._sub = this.SUB_DURATION;
        this._running = false;
        this._sessionXP = 0;

        document.getElementById('rk-back').addEventListener('click', () => {
            this.teardown();
            App.navigate('activities');
        });

        const btnPlay = document.getElementById('rk-play');

        document.getElementById('rk-stop').addEventListener('click', () => {
            const elapsed = this.TOTAL - this._remaining;
            if (elapsed > 0) {
                showToast(`🙌 Session arrêtée · ${this._sessionXP} XP récoltés`);
            }
            this.teardown();
            this.updateUI();
            btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
            document.getElementById('rk-orb')?.classList.remove('pulsing');
        });

        btnPlay.addEventListener('click', () => {
            if (!this._running) {
                this.start();
                btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>';
                document.getElementById('rk-orb')?.classList.add('pulsing');
            } else {
                this.pause();
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
                document.getElementById('rk-orb')?.classList.remove('pulsing');
            }
        });
    },

    start() {
        this._running = true;
        if (!this._audioCtx) {
            try { this._audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        }
        this._interval = setInterval(() => {
            if (this._remaining <= 0) {
                // Session complete!
                this.pause();
                document.getElementById('rk-orb')?.classList.remove('pulsing');
                document.getElementById('rk-play').innerHTML = '<i class="fa-solid fa-play"></i>';
                const lbl = document.getElementById('rk-orb-lbl');
                if (lbl) lbl.textContent = 'Session terminée ✓';
                showToast('✨ 45 minutes Reiki complètes ! Magnifique session.');
                confetti(window.innerWidth / 2, 300);
                Store.addXP(50, window.innerWidth / 2, 300);
                Store.unlockBadge('reiki_full');
                Store.logActivity('reiki', { minutes: 45 });
                checkAutoBadges();
                return;
            }

            this._remaining--;
            this._sub--;

            // XP every minute
            const elapsed = this.TOTAL - this._remaining;
            if (elapsed % 60 === 0 && elapsed > 0) {
                this._sessionXP += 10;
                Store.addXP(10);
                const xpEl = document.getElementById('rk-xp');
                if (xpEl) xpEl.textContent = `+${this._sessionXP} XP cette session`;
            }

            // Sub-timer: ring bowl every 3 min
            if (this._sub <= 0) {
                this._sub = this.SUB_DURATION;
                Store.unlockBadge('reiki_bell'); // premier bol débloqué dès la 1ère sonnerie
                this.playBowl();
            }

            this.updateUI();
        }, 1000);
    },

    pause() {
        clearInterval(this._interval);
        this._running = false;
    },

    updateUI() {
        // Global: shows remaining time
        const rm = Math.floor(this._remaining / 60).toString().padStart(2, '0');
        const rs = (this._remaining % 60).toString().padStart(2, '0');
        const gEl = document.getElementById('rk-global');
        if (gEl) gEl.textContent = `${rm}:${rs}`;

        // Sub-timer text
        const sm = Math.floor(this._sub / 60).toString().padStart(2, '0');
        const ss = (this._sub % 60).toString().padStart(2, '0');
        const sEl = document.getElementById('rk-sub');
        if (sEl) sEl.textContent = `${sm}:${ss}`;

        // Sub-ring fills as the 3 min loop progresses
        const ring = document.getElementById('rk-subring');
        if (ring) {
            const pct = 1 - (this._sub / this.SUB_DURATION);
            ring.style.strokeDashoffset = 314 * (1 - pct);
        }
    },

    playBowl() {
        const flash = document.getElementById('reiki-flash');
        if (flash) {
            flash.style.background = 'rgba(206,147,216,0.4)';
            setTimeout(() => flash.style.background = 'transparent', 600);
        }
        showToast('🔔 Changement de position · Inspirez profondément');
        if (this._audioCtx) {
            try {
                // Layer 2 oscillators for a richer bowl tone
                [432, 528].forEach((freq, i) => {
                    const osc  = this._audioCtx.createOscillator();
                    const gain = this._audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, this._audioCtx.currentTime + i * 0.05);
                    gain.gain.linearRampToValueAtTime(0.3, this._audioCtx.currentTime + i * 0.05 + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, this._audioCtx.currentTime + 4);
                    osc.connect(gain);
                    gain.connect(this._audioCtx.destination);
                    osc.start(this._audioCtx.currentTime + i * 0.05);
                    osc.stop(this._audioCtx.currentTime + 4);
                });
            } catch(e) {}
        }
    }
});

/* Vérifie et débloque automatiquement tous les badges */
function checkAutoBadges() {
    const s  = Store.state;
    const al = s.activityLog || {};

    // -- Streak --
    if (s.streak >= 7)   Store.unlockBadge('streak_7');
    if (s.streak >= 21)  Store.unlockBadge('monk_21');
    if (s.streak >= 30)  Store.unlockBadge('streak_30');
    if (s.streak >= 100) Store.unlockBadge('senator');

    // -- Quêtes --
    if (s.quests.every(q => q.done)) Store.unlockBadge('quests_all');
    if ((s.perfectQuestStreak || 0) >= 3) Store.unlockBadge('quest_triple');
    if ((s.perfectQuestStreak || 0) >= 7) Store.unlockBadge('quest_7');

    // -- Yoga --
    if ((s.yogaCount || 0) >= 5) Store.unlockBadge('yogi_5');
    const flows4 = ['stretching','energy','relaxation','mobility'];
    if (flows4.every(f => (s.yogaFlowsCompleted || []).includes(f))) Store.unlockBadge('explorer');

    // -- Walk --
    if ((s.walkCount || 0) >= 10) Store.unlockBadge('walk_10');
    if ((s.walkCount || 0) >= 50) Store.unlockBadge('walker_50');

    // -- Workout --
    if ((s.workoutCount || 0) >= 5) Store.unlockBadge('warrior_5');

    // -- Reiki semaine (4 sessions dans la même semaine) --
    if (Object.values(s.weekReikiSessions || {}).some(n => n >= 4)) Store.unlockBadge('reiki_week');

    // -- Reiki cumulé --
    if ((s.reikiMinutes || 0) >= 300) Store.unlockBadge('reiki_5h');

    // -- XP cumulé --
    if ((s.totalXPEarned || 0) >= 1000)  Store.unlockBadge('century');
    if ((s.totalXPEarned || 0) >= 10000) Store.unlockBadge('xp_10k');

    // -- Niveau --
    if (s.level >= 10) Store.unlockBadge('master_10');

    // -- Polyvalent : les 4 activités dans une même semaine --
    const weekMap = {};
    Object.entries(al).forEach(([dateStr, acts]) => {
        const wk = getWeekKey(new Date(dateStr));
        if (!weekMap[wk]) weekMap[wk] = {};
        Object.keys(acts).forEach(k => { if (acts[k]) weekMap[wk][k] = true; });
    });
    if (Object.values(weekMap).some(w => w.walk && w.yoga && w.workout && w.reiki))
        Store.unlockBadge('polyvalent');

    // -- L'Éveil : toutes les 4 activités le même jour, 30 fois --
    const fullDays = Object.values(al).filter(d => d.walk && d.yoga && d.workout && d.reiki).length;
    if (fullDays >= 30) Store.unlockBadge('awakening');

    // -- Bibliothèque Vivante : tous les badges sauf lui-même --
    const allOtherIds = BADGES_CATALOGUE.filter(b => b.id !== 'library').map(b => b.id);
    const earned = new Set((s.achievements || []).map(a => a.id));
    if (allOtherIds.every(id => earned.has(id))) Store.unlockBadge('library');
}

            <div><div style="font-family:var(--font-h);font-size:1.4rem;font-weight:800">${s.xp}</div><div style="font-size:0.75rem;color:var(--text-light)">XP Total</div></div>
            <div style="width:1px;background:var(--neutral-mid)"></div>
            <div><div style="font-family:var(--font-h);font-size:1.4rem;font-weight:800">${s.streak}🔥</div><div style="font-size:0.75rem;color:var(--text-light)">Streak</div></div>
        </div>

        <!-- SETTINGS -->
        <div class="card">
            <div class="section-title">Préférences</div>

            <div class="setting-row">
                <div class="setting-left">
                    <div class="setting-icon">🎵</div>
                    <span class="setting-label">Sons des Bols Tibétains</span>
                </div>
                <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
            </div>

            <div class="setting-row">
                <div class="setting-left">
                    <div class="setting-icon">🔔</div>
                    <span class="setting-label">Rappels quotidiens</span>
                </div>
                <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
            </div>

            <div class="setting-row">
                <div class="setting-left">
                    <div class="setting-icon">✨</div>
                    <span class="setting-label">Animations et effets</span>
                </div>
                <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
            </div>
        </div>

        <!-- RESET -->
        <button class="btn-reset" id="btn-reset">
            <i class="fa-solid fa-arrow-rotate-left" style="margin-right:6px"></i> Remettre à zéro la progression
        </button>
        `;
    },
    mount() {
        document.getElementById('btn-reset').addEventListener('click', () => {
            if (confirm('Êtes-vous sûr ? Toute votre progression sera effacée.')) {
                Store.reset();
                App.navigate('dashboard');
                showToast('🌱 Nouveau départ ! Vous êtes au niveau 1.');
            }
        });
    }
});


/* ============================================
   UTILS
============================================ */
function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#263238;color:white;padding:10px 18px;border-radius:9999px;font-size:0.85rem;font-weight:600;z-index:9998;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:bubbleUp 2.5s ease-out forwards`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2600);
}

function confetti(x, y) {
    const colors = ['#00897B','#FF9800','#9C27B0','#66BB6A','#29B6F6'];
    for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        const angle = (Math.random() * 360) * Math.PI / 180;
        const dist  = 60 + Math.random() * 80;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist - 60;
        const dr = (Math.random() - 0.5) * 540 + 'deg';
        p.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'3px'};pointer-events:none;z-index:9997;--dx:${dx}px;--dy:${dy}px;--dr:${dr};animation:confettiFly 0.7s ease-out forwards`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 750);
    }
}


/* ============================================
   BOOT
============================================ */
document.addEventListener('DOMContentLoaded', () => {
    Store.updateHeader();
    App.init();
});
</script>

        .then(() => console.log('✅ Service Worker enregistré'))
        .catch(err => console.warn('SW error:', err));
    });
  }
</script>
